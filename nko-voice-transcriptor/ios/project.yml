name: NKoVoiceTranscriptor
options:
  bundleIdPrefix: net.nkotools
  deploymentTarget:
    iOS: "16.0"
targets:
  NKoVoiceTranscriptor:
    type: application
    platform: iOS
    sources: [NKoVoiceTranscriptor]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.nkotools.transcriptor
        MARKETING_VERSION: 1.10.0
        CURRENT_PROJECT_VERSION: 11000
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Record Manding speech for N'Ko transcription.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: NO
