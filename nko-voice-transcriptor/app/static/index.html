<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ߒߞߏ — N'KO Voice Transcriptor</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header>
  <h1><span class="nko-glyph">ߒߞߏ</span> N'KO Voice Transcriptor</h1>
  <p class="subtitle">Speak Bambara — read N'Ko</p>
  <div id="auth-status"></div>
</header>

<main>
  <!-- Auth panel -->
  <section id="auth-panel" class="card">
    <h2>Sign in</h2>
    <form id="auth-form" autocomplete="on">
      <label>Username
        <input id="username" name="username" minlength="3" maxlength="64"
               pattern="[a-zA-Z0-9_.\-]+" required autocomplete="username">
      </label>
      <label>Password
        <input id="password" name="password" type="password" minlength="10"
               maxlength="128" required autocomplete="current-password">
      </label>
      <div class="row">
        <button type="submit" data-mode="login">Log in</button>
        <button type="submit" data-mode="register" class="secondary">Register</button>
      </div>
      <p id="auth-error" class="error" role="alert"></p>
    </form>
  </section>

  <!-- Recorder panel -->
  <section id="app-panel" class="card hidden">
    <h2>Record</h2>
    <div class="row">
      <label class="inline">Language
        <select id="language-select" title="Source language"></select>
      </label>
    </div>
    <div class="row">
      <button id="start-btn" class="record">● Start</button>
      <button id="standby-btn" class="secondary" disabled>❚❚ Stand by</button>
      <button id="stop-btn" class="secondary" disabled>■ Stop</button>
      <span id="record-timer" aria-live="polite"></span>
      <span id="record-state" class="hint" aria-live="polite"></span>
    </div>
    <p class="hint">…or upload an audio file:</p>
    <input type="file" id="file-input" accept="audio/*">
    <p id="app-error" class="error" role="alert"></p>

    <div id="result" class="hidden">
      <h3>N'Ko <span class="hint">— editable, click to correct</span></h3>
      <textarea class="nko-text" id="result-nko" dir="rtl" lang="nqo" rows="2"
                spellcheck="false"></textarea>
      <h3>Latin (Bambara)</h3>
      <p id="result-latin" lang="bm"></p>
      <div class="row">
        <button id="save-nko-btn" class="secondary" disabled>💾 Save edit</button>
        <button id="copy-nko-btn" class="secondary">⧉ Copy N'Ko</button>
        <button id="copy-latin-btn" class="secondary">⧉ Copy Latin</button>
        <span id="save-state" class="hint" aria-live="polite"></span>
      </div>
      <div class="row">
        <span class="hint">Download:</span>
        <button id="dl-txt-btn" class="secondary">⤓ TXT</button>
        <button id="dl-png-btn" class="secondary">⤓ PNG</button>
        <button id="dl-pdf-btn" class="secondary">⤓ PDF</button>
      </div>
    </div>

    <h2>Try text directly</h2>
    <div class="row">
      <input id="text-input" placeholder="e.g. i ni ce" maxlength="500">
      <button id="paste-btn" class="secondary" title="Paste from clipboard">⎘ Paste</button>
      <button id="text-btn" class="secondary">→ ߒߞߏ</button>
    </div>
    <textarea class="nko-text" id="text-output" dir="rtl" lang="nqo" rows="2"
              spellcheck="false" placeholder="ߒߞߏ…"></textarea>
    <button id="copy-text-btn" class="secondary hidden">⧉ Copy N'Ko</button>

    <!-- On-screen N'Ko keyboard -->
    <div class="row">
      <button id="keyboard-toggle" class="secondary" aria-expanded="false">⌨ N'Ko keyboard</button>
    </div>
    <div id="keyboard" class="keyboard hidden" role="group" aria-label="N'Ko keyboard"></div>

    <h2>History</h2>
    <ul id="history"></ul>
  </section>
</main>

<footer>
  <p>Manding → N'Ko (script of Solomana Kanté). Recognition quality depends on
     the configured ASR engine.</p>
</footer>

<!-- Print-only area used for "Download PDF" (browser Save as PDF) -->
<div id="print-area" aria-hidden="true">
  <div id="print-nko" dir="rtl" lang="nqo"></div>
  <div id="print-latin" lang="bm"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
