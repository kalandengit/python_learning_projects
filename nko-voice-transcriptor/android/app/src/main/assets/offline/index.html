<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ߒߞߏ — Offline Tools</title>
<style>
:root { --bg:#10141a; --card:#1a2129; --ink:#e8e6e3; --accent:#d4a017; --muted:#8a949e; }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font:16px/1.5 system-ui,sans-serif; padding:0 4vw 3rem; }
h1 { font-size:1.3rem; margin:1rem 0 .2rem; } h1 .g { color:var(--accent); font-size:1.6rem; }
.note { color:var(--muted); font-size:.85rem; margin:0 0 1rem; }
.card { background:var(--card); border-radius:12px; padding:1rem; margin:.8rem 0; }
h2 { font-size:1.05rem; margin:.2rem 0 .6rem; }
textarea,input,select { width:100%; padding:.5rem .7rem; border-radius:8px; border:1px solid var(--muted); background:transparent; color:var(--ink); font-size:1rem; }
.row { display:flex; gap:.5rem; margin:.6rem 0; flex-wrap:wrap; } .row>* { flex:1; min-width:7rem; }
button { padding:.55rem 1rem; border:0; border-radius:8px; background:var(--accent); color:#10141a; font-weight:600; }
button.sec { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.nko { direction:rtl; text-align:right; font-size:1.7rem; line-height:1.9; font-family:"Noto Sans NKo","Ebrima",sans-serif; background:rgb(212 160 23/8%); border-radius:8px; padding:.5rem .8rem; min-height:2rem; overflow-wrap:anywhere; }
ul { list-style:none; padding:0; margin:.5rem 0; }
li { border-top:1px solid rgb(138 148 158/25%); padding:.45rem 0; display:flex; justify-content:space-between; gap:.6rem; align-items:baseline; }
li .n { direction:rtl; font-size:1.3rem; font-family:"Noto Sans NKo","Ebrima",sans-serif; }
.kb { display:flex; flex-direction:column; gap:.35rem; margin:.5rem 0; }
.kr { display:flex; flex-wrap:wrap; gap:.3rem; }
.kk { min-width:2.2rem; padding:.45rem; font-size:1.3rem; background:var(--card); color:var(--ink); border:1px solid var(--muted); border-radius:8px; font-family:"Noto Sans NKo","Ebrima",sans-serif; }
table { border-collapse:collapse; width:100%; font-size:.9rem; }
td,th { border-bottom:1px solid rgb(138 148 158/25%); padding:.3rem .4rem; text-align:left; }
td.g { font-size:1.5rem; font-family:"Noto Sans NKo","Ebrima",sans-serif; }
.hidden { display:none; }
</style>
</head>
<body>
<h1><span class="g">ߒߞߏ</span> Offline Tools</h1>
<p class="note">Runs fully on this device — no server, no internet. Voice transcription
needs the online app (⋮ menu → Online app). Lexicon © NKo Wuruki / N'Ko Institute.</p>

<div class="card">
  <h2>Text → N'Ko</h2>
  <textarea id="in" rows="2" placeholder="e.g. i ni ce / an ka bamanankan kalan"></textarea>
  <div class="row"><button id="go">→ ߒߞߏ</button><button id="kbBtn" class="sec">⌨ Keyboard</button></div>
  <div id="out" class="nko"></div>
  <div id="kb" class="kb hidden"></div>
</div>

<div class="card">
  <h2>Dictionary (offline)</h2>
  <div class="row">
    <input id="dq" placeholder="Search…">
    <select id="dl">
      <option value="fr">Français → ߒߞߏ</option>
      <option value="bm">Bamanankan → ߒߞߏ</option>
      <option value="nko">ߒߞߏ →</option>
    </select>
    <button id="db">🔍</button>
  </div>
  <ul id="dr"></ul>
</div>

<div class="card">
  <h2>Alphabet</h2>
  <button id="ab" class="sec">Show / hide the 62 characters</button>
  <div id="at" class="hidden"></div>
</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
$("go").onclick = () => { $("out").textContent = nkoTransliterate($("in").value); };

// Dictionary
function dict() {
  const hits = nkoDictSearch($("dq").value, $("dl").value, 25);
  const ul = $("dr"); ul.replaceChildren();
  if (!hits.length) { const li=document.createElement("li"); li.textContent="—"; ul.append(li); return; }
  for (const e of hits) {
    const li = document.createElement("li");
    const a = document.createElement("span"); a.textContent = $("dl").value === "bm" ? e.bm : e.fr;
    const n = document.createElement("span"); n.className = "n"; n.textContent = e.nko;
    li.append(a, n); ul.append(li);
  }
}
$("db").onclick = dict;
$("dq").addEventListener("keydown", (e) => { if (e.key === "Enter") dict(); });

// Keyboard (full block, same layout as the online app)
const ROWS = [
  ["ߊ","ߋ","ߌ","ߍ","ߎ","ߏ","ߐ"],
  ["ߓ","ߔ","ߕ","ߖ","ߗ","ߘ","ߙ","ߚ","ߛ","ߜ"],
  ["ߝ","ߞ","ߟ","ߡ","ߢ","ߣ","ߤ","ߥ","ߦ","ߒ"],
  ["ߠ","ߧ","ߨ","ߩ","ߪ","ߑ"],
  ["◌߫","◌߬","◌߭","◌߮","◌߯","◌߰","◌߱"],
  ["◌߲","◌߳","◌߽"],
  ["߀","߁","߂","߃","߄","߅","߆","߇","߈","߉"],
  ["ߴ","ߵ","ߺ","߶","߷","߸","߹","؟"],
  ["␣","⌫"],
];
const names = {}; for (const a of NKO_DATA.alphabet) names[a.char] = a.latin ? a.latin+" · "+a.name : a.name;
let built = false;
$("kbBtn").onclick = () => {
  if (!built) {
    for (const row of ROWS) {
      const d = document.createElement("div"); d.className = "kr";
      for (const k of row) {
        const b = document.createElement("button"); b.className = "kk"; b.textContent = k;
        b.title = names[k.replace("◌","")] || "";
        b.onclick = () => {
          const o = $("out");
          if (k === "⌫") o.textContent = o.textContent.slice(0, -1);
          else if (k === "␣") o.textContent += " ";
          else o.textContent += k.replace("◌","");
        };
        d.append(b);
      }
      $("kb").append(d);
    }
    built = true;
  }
  $("kb").classList.toggle("hidden");
};

// Alphabet table
let atBuilt = false;
$("ab").onclick = () => {
  if (!atBuilt) {
    const t = document.createElement("table");
    t.innerHTML = "<tr><th>Char</th><th>Latin</th><th>Name</th><th>Type</th></tr>";
    for (const a of NKO_DATA.alphabet) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td class="g">${a.char}</td><td>${a.latin||""}</td><td>${a.name}</td><td>${a.kind}</td>`;
      t.append(tr);
    }
    $("at").append(t); atBuilt = true;
  }
  $("at").classList.toggle("hidden");
};
</script>
</body>
</html>
