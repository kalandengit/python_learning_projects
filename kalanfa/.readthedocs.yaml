version: 2
formats: all
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_checkout:
      # setuptools-scm needs git tag history to compute kolibri's version;
      # ReadTheDocs' default shallow clone can leave no tag reachable.
      - git fetch --unshallow || true
    post_system_dependencies:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --group docs
sphinx:
  configuration: docs/conf.py
