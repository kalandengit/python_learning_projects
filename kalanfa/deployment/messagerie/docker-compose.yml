# Messagerie Kalanfa — Mattermost Team Edition (licence MIT)
# Binaire unique + PostgreSQL : ~2 Go de RAM pour ~1000 utilisateurs,
# adapté au serveur local d'une école (voir ADR-006).
#
# Usage :
#   cp .env.example .env   # définir MM_POSTGRES_PASSWORD
#   docker compose up -d
# Puis créer le compte admin système, générer un jeton d'accès personnel et
# le fournir à Kalanfa via KALANFA_MATTERMOST_URL / KALANFA_MATTERMOST_TOKEN.
services:
  mattermost-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: ${MM_POSTGRES_PASSWORD:?Definir MM_POSTGRES_PASSWORD}
    volumes:
      - mm_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mattermost:
    image: mattermost/mattermost-team-edition:10.5
    depends_on:
      - mattermost-db
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: >-
        postgres://mmuser:${MM_POSTGRES_PASSWORD}@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: ${MM_SITE_URL:-http://localhost:8065}
      # Français par défaut pour l'école
      MM_LOCALIZATIONSETTINGS_DEFAULTSERVERLOCALE: fr
      MM_LOCALIZATIONSETTINGS_DEFAULTCLIENTLOCALE: fr
      # Les équipes sont sur invitation : pas de création ouverte
      MM_TEAMSETTINGS_ENABLETEAMCREATION: "false"
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "false"
    ports:
      - "8065:8065"
    volumes:
      - mm_data:/mattermost/data
      - mm_logs:/mattermost/logs
      - mm_config:/mattermost/config
      - mm_plugins:/mattermost/plugins
    restart: unless-stopped

volumes:
  mm_pgdata:
  mm_data:
  mm_logs:
  mm_config:
  mm_plugins:
