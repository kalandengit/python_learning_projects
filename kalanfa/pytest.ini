[pytest]
testpaths = test/ kalanfa/
norecursedirs = dist tmp* .svn .* node_modules
# Settings for pytest-django
django_find_project = false
DJANGO_SETTINGS_MODULE = kalanfa.deployment.default.settings.test
# Settings for pytest-pythonpath (pytest < 7)
python_paths = kalanfa/dist
# Built-in pythonpath (pytest 7+, used on Python 3.14+ where pytest-pythonpath is not installed)
pythonpath = kalanfa/dist
env =
    # cleaned up in conftest.py fixture
    KALANFA_HOME=./.pytest_kalanfa_home
