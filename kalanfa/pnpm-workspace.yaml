  - kolibri-design-system
packages:
  - packages/*
  - kolibri/core
  - kolibri/plugins/*
  - python_packages/*
catalog:
  "@testing-library/jest-dom": ^6.6.4
  "@testing-library/user-event": ^14.6.1
  "@testing-library/vue": ^5
  "@vue/test-utils": ^1.3.6
  "@vueuse/core": ^11.3.0
  xhr-mock: ^2.5.1
  core-js: ^3.47.0
  kolibri-constants: 0.2.16
  kolibri-design-system: 5.7.0
  lodash: ^4.17.23
  vue: 2.7.16
  vue-meta: ^2.4.0
  vue-router: ^3.6.5
  vuex: ^3.6.2
  xstate: ^4.38.3
onlyBuiltDependencies:
