# minimum number of minutes
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - kalanfa-constants
  - kalanfa-design-system
packages:
  - packages/*
  - kalanfa/core
  - kalanfa/plugins/*
  - python_packages/*
catalog:
  "@testing-library/jest-dom": ^6.6.4
  "@testing-library/user-event": ^14.6.1
  "@testing-library/vue": ^5
  "@vue/test-utils": ^1.3.6
  "@vueuse/core": ^11.3.0
  xhr-mock: ^2.5.1
  core-js: ^3.47.0
  # External packages published on npm under their upstream Kolibri names;
  # aliased so Kalanfa-renamed imports keep resolving.
  kalanfa-constants: npm:kolibri-constants@0.2.16
  kalanfa-design-system: npm:kolibri-design-system@5.7.0
  lodash: ^4.17.23
  vue: 2.7.16
  vue-meta: ^2.4.0
  vue-router: ^3.6.5
  vuex: ^3.6.2
  xstate: ^4.38.3
onlyBuiltDependencies:
  - core-js
  - deasync
  - es5-ext
  - node-sass
  - unrs-resolver
  - vue-demi
