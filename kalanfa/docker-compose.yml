version: '3.4'
services:
  postgres:
    image: postgres:16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d default"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - kalanfa-pg:/var/lib/postgresql/data
#    command: "postgres -c log_statement=all -c log_line_prefix='%t %d '"
volumes:
  kalanfa-pg:
