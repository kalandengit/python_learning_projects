# Local development infrastructure for the AI School Assistant platform.
#
# Pinned image tags only — never `latest` — so every developer and CI run uses
# the same versions (reproducible builds, Twelve-Factor dev/prod parity).
# This file provisions backing services only; application services run on the
# host via `pnpm`/`turbo` for fast iteration.
#
#   docker compose -f infrastructure/docker-compose.dev.yml up -d
#
# Credentials here are for LOCAL DEVELOPMENT ONLY and come from .env
# (copy .env.example -> .env). Never reuse these values outside local dev.

name: asa-dev

services:
  postgres:
    image: postgres:17.2-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-asa}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-asa} -d ${POSTGRES_DB:-asa}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.1-bookworm
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--appendonly', 'no']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant-data:/qdrant/storage

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '9200:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  nats:
    image: nats:2.10.24-alpine
    restart: unless-stopped
    command: ['--jetstream', '--store_dir=/data', '--http_port=8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command: ['start-dev']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_password}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-asa}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-asa_dev_password}
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-asa}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-asa_dev_password}
      POSTGRES_SEEDS: postgres
    ports:
      - '7233:7233'
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.32.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - '8081:8080'
    depends_on:
      - temporal

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-asa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-asa_dev_password}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  opensearch-data:
  nats-data:
  minio-data:
