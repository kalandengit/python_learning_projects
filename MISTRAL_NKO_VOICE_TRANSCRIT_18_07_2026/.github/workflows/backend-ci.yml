name: backend-ci

on:
  push:
    branches: [main, develop, backend]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Security lint (bandit)
        run: bandit -r app -x app/static -q
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements-lock.txt || true  # report-only until lock stabilizes
      - name: Tests
        env:
          NKO_SECRET_KEY: ci-only-secret-key-0123456789abcdef-not-production
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f backend/Dockerfile -t nko-transcriptor:ci backend
