# Hardened nginx reverse-proxy sample for the N'Ko Voice Transcriptor.
# TLS certificates via certbot; HSTS only once TLS is stable.

limit_req_zone $binary_remote_addr zone=nko_api:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name nko.example.com;

    ssl_certificate     /etc/letsencrypt/live/nko.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nko.example.com/privkey.pem;

    # Body size cap at the edge — first line of defense (audit finding).
    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;

    location / {
        limit_req zone=nko_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keep detailed health internal.
    location /api/health/detailed {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000;
    }
}

server {
    listen 80;
    server_name nko.example.com;
    return 301 https://$host$request_uri;
}
