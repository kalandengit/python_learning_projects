[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "S"]
# S101: assert in tests; B008: Depends() defaults are the FastAPI idiom
ignore = ["S101", "B008"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106", "S107"]  # test-only passwords

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
