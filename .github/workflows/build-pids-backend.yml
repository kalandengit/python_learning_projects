name: Build PIDS backend image

# Builds a multi-arch (amd64 + arm64) image for the PIDS backend and pushes it to GHCR.
# The arm64 variant is what the Raspberry Pi 5 k3s manifests (deploy/k3s/pids.yaml) run.

on:
  push:
    branches: ["**"]
    paths:
      - "projects/pids-mvp/backend/**"
      - ".github/workflows/build-pids-backend.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pids-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps and run tests
        working-directory: projects/pids-mvp/backend
        run: |
          pip install -r requirements.txt
          python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: projects/pids-mvp/backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
