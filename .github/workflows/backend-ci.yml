name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-quran-teacher/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'ai-quran-teacher/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-quran-teacher/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai-quran-teacher/backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test

  docker-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-quran-teacher-backend ai-quran-teacher/backend
      # Add a push step (ECR/GHCR/Heroku) once deployment credentials are
      # configured as repository secrets — see docs/IMPLEMENTATION_GUIDE.md.
