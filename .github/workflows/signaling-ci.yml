name: Signaling Server CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-quran-teacher/signaling-server/**'
      - '.github/workflows/signaling-ci.yml'
  pull_request:
    paths:
      - 'ai-quran-teacher/signaling-server/**'
      - '.github/workflows/signaling-ci.yml'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-quran-teacher/signaling-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Start server and check health endpoint
        run: |
          PORT=3999 node server.js &
          SERVER_PID=$!
          sleep 2
          curl --fail http://localhost:3999/health
          kill $SERVER_PID
