# kube-vip — floating Virtual IP for the k3s control plane (HA API endpoint) in L2/ARP mode.
#
# Purpose: the 3 server (control-plane) nodes share ONE VIP, so kubeconfig / agents / the
# `--tls-san <VIRTUAL_IP>` you set at bootstrap always reach a live API server even if one
# control-plane Pi dies.
#
# Install:
#   1) Choose an unused LAN IP for the control-plane VIP (e.g. 192.168.1.239) — distinct from
#      the MetalLB pool (192.168.1.240-250) used for Service LoadBalancers.
#   2) Set that IP in `address` below and the interface name in `vip_interface` (usually eth0).
#   3) Apply RBAC + the DaemonSet:
#        sudo k3s kubectl apply -f deploy/k3s/kube-vip.yaml
#      (Bootstrap chicken-and-egg tip: the very first server can host kube-vip as a static pod
#       by dropping this file into /var/lib/rancher/k3s/server/manifests/ before `k3s server`.)
#
# The DaemonSet runs only on control-plane nodes (nodeSelector on the k3s control-plane label).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:kube-vip-role
rules:
  - apiGroups: [""]
    resources: ["services", "services/status", "nodes", "endpoints"]
    verbs: ["list", "get", "watch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["list", "get", "watch", "update", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:kube-vip-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-vip-role
subjects:
  - kind: ServiceAccount
    name: kube-vip
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
spec:
  selector:
    matchLabels: { app: kube-vip }
  template:
    metadata:
      labels: { app: kube-vip }
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.7
          args: ["manager"]
          env:
            - { name: vip_arp, value: "true" }
            - { name: vip_interface, value: "eth0" }          # <-- your NIC
            - { name: address, value: "192.168.1.239" }        # <-- control-plane VIP
            - { name: port, value: "6443" }
            - { name: cp_enable, value: "true" }
            - { name: svc_enable, value: "false" }             # MetalLB handles Service LBs
            - { name: vip_leaderelection, value: "true" }
            - { name: vip_leaseduration, value: "15" }
            - { name: vip_renewdeadline, value: "10" }
            - { name: vip_retryperiod, value: "2" }
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
