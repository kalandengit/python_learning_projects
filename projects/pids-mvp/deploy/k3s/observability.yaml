# Edge observability for the PIDS Pi 5 cluster: Prometheus scrapes the backend's /metrics,
# Grafana renders SLO / NAR / MTTA dashboards.
#
# Apply:
#   sudo k3s kubectl apply -f deploy/k3s/observability.yaml
#   # load the dashboard JSON as a ConfigMap Grafana auto-provisions:
#   sudo k3s kubectl -n monitoring create configmap pids-dashboard \
#     --from-file=deploy/monitoring/grafana-dashboard.json
#   sudo k3s kubectl -n monitoring rollout restart deploy/grafana
#
# Grafana default login: admin / admin (change GF_SECURITY_ADMIN_PASSWORD below).
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# --- Prometheus scrape config (discovers pids-api pods and scrapes :8000/metrics) ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: pids-api
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [pids]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: pids-api
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:8000
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
        metrics_path: /metrics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
---
# --- Grafana with provisioned datasource + dashboard provider ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: pids
        folder: PIDS
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: "admin" }   # CHANGE ME
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - { name: datasource, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashprovider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: datasource
          configMap:
            name: grafana-provisioning
            items: [{ key: datasource.yaml, path: datasource.yaml }]
        - name: dashprovider
          configMap:
            name: grafana-provisioning
            items: [{ key: dashboards.yaml, path: dashboards.yaml }]
        - name: dashboards
          configMap:
            name: pids-dashboard          # created from deploy/monitoring/grafana-dashboard.json
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.1.241"
spec:
  type: LoadBalancer
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
