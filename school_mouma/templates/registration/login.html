{% extends "base.html" %}

{% block titre %}Connexion{% endblock %}

{% block contenu %}
  <h1>Connexion</h1>
  {% if form.errors %}
    <p class="erreur">Identifiant ou mot de passe incorrect.</p>
  {% endif %}
  <form method="post" class="formulaire">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Se connecter</button>
  </form>
{% endblock %}
