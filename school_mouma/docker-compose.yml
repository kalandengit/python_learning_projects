# PROJET_SCHOOL_MOUMA_BKO_2026 - orchestration de production
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: school_mouma
      POSTGRES_USER: mouma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD dans .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://mouma:${POSTGRES_PASSWORD}@db:5432/school_mouma
    depends_on:
      - db
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
